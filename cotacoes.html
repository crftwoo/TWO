<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Cotação Express - Final</title>

    <!-- Tailwind CSS para o Design Premium -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- React e Babel para a Lógica Inteligente -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- html2canvas -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700;900&display=swap');

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #050505;
        }

        .tech-btn-green {
            box-shadow: 0 8px 15px rgba(155, 226, 13, 0.2);
            transition: all 0.3s ease;
        }

        .tech-btn-green:hover {
            box-shadow: 0 12px 20px rgba(155, 226, 13, 0.4);
            transform: translateY(-2px);
        }

        /* Esconder setas do input number */
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            appearance: none;
            margin: 0;
        }

        input[type=number] {
            -moz-appearance: textfield;
            appearance: textfield;
        }

        /* Classe especial p/ forçar layout de PC no momento do print via html2canvas no mobile */
        .print-mode {
            width: 1024px !important;
            max-width: 1024px !important;
            min-width: 1024px !important;
            position: absolute !important;
            top: 0;
            left: 0;
            z-index: -9999;
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo } = React;

        // --- Configurações de Dados ---
        const COBRE_PESO = { "1/4": 0.123, "3/8": 0.19, "1/2": 0.263, "5/8": 0.26, "3/4": 0.40 };
        const ISOLAMENTO_PRECO = { "1/4": 1.89, "3/8": 1.99, "1/2": 2.59, "5/8": 3.69, "3/4": 3.89 };
        const FITAS = {
            pvc: { n: "FITA PVC S/ADESIVO 100MMX10M BRANCA HULTER", p: 3.90 },
            iso: { n: "FITA ISOLANTE 18MM X 15M ANTICHAMA PRETA DUGOLD", p: 4.90 },
            alu: { n: "FITA ALUMINIZADA 45MM X 45M HULTER", p: 4.95 }
        };
        const CABOS = {
            "2x1,5": { n: "CABO PP 2X1,5MM 1KV 100M RCM", p: 5.50 },
            "3x1,5": { n: "CABO PP 3X1,5MM 1KV 100M RCM", p: 7.80 },
            "4x1,5": { n: "CABO PP 4X1,5MM 1KV 100M RCM", p: 9.80 },
            "5x1,5": { n: "CABO PP CONTROLE 5X1,5MM 1KV 100M RCM", p: 13.80 },
            "6x1,5": { n: "CABO PP CONTROLE 6X1,5MM 1KV 100M RCM", p: 21.70 }
        };
        const SUPORTES = {
            "400mm": { n: "Suporte Split Hulter 7 à 12.000 BTUs 400mm", p: 29.90 },
            "450mm": { n: "Suporte para Condensadora Barril 7000 a 12000 BTUS 450mm Hulter", p: 39.90 },
            "500mm": { n: "Suporte 50cm para Split 12000 a 24000 BTUs 80 kg 500mm Hulter", p: 49.90 },
            "600mm": { n: "Suporte Split Barril 60 x 50 cm 18000 a 48000 BTUs 160 kg 600mm Hulter", p: 119.00 },
            "900mm": { n: "Suporte Split Hulter 18 à 60.000 BTUs 900mm x 600mm", p: 189.00 },
            "evap": { n: "Suporte Evaporadora Piso teto Hulter 30 à 80.000 BTUs 600mm x230mm x 200mm", p: 99.00 }
        };
        const CAIXAS = {
            "29": { n: "Caixa de Passagem Split 29cm x 17 Reversível Hulter", p: 13.90 },
            "39": { n: "Caixa de Passagem Split 39cm x 17 Reversível Hulter", p: 18.90 }
        };

        function App() {
            const [input, setInput] = useState('');
            const [valorKgCobre, setValorKgCobre] = useState(155);
            const [itens, setItens] = useState([]);
            const [erros, setErros] = useState([]);
            const [copiado, setCopiado] = useState(false);
            const tableRef = React.useRef(null);

            const totalGeral = useMemo(() => itens.reduce((acc, item) => acc + item.total, 0), [itens]);

            const processarOrcamento = () => {
                const linhas = input.toLowerCase().split('\n');
                const mapaItens = new Map();
                const novosErros = [];
                let pedirIsolamentoGenerico = false;

                linhas.forEach((linha) => {
                    const l = linha.trim();
                    if (!l) return;
                    let identificado = false;

                    // Extrai a quantidade do início da linha (ex: "2 panquecas" -> 2)
                    let qtdLinha = 1;
                    const matchQtdInicio = l.match(/^(\d+)/);
                    if (matchQtdInicio) qtdLinha = parseInt(matchQtdInicio[1]);

                    // 1. COBRE
                    for (const bitola in COBRE_PESO) {
                        if (l.includes(bitola) && (l.includes('cano') || l.includes('cobre') || l.includes('panq') || l.includes('panc'))) {
                            const mMatch = l.match(/(\d+)\s*(m|metro|metros)/);
                            const panMatch = l.match(/(panq|panc|panqueca)/);

                            let metros = 0;
                            if (mMatch) metros = parseInt(mMatch[1]);
                            else if (panMatch) metros = qtdLinha * 15;
                            else metros = qtdLinha;

                            if (metros > 0) {
                                const chave = `cobre-${bitola}`;
                                const existente = mapaItens.get(chave);
                                mapaItens.set(chave, {
                                    nome: `CANO COBRE ${bitola}`,
                                    qtdNumerica: (existente?.qtdNumerica || 0) + metros,
                                    valorUnit: valorKgCobre,
                                    tipo: 'cobre',
                                    bitola
                                });
                                identificado = true; break;
                            }
                        }
                    }

                    // 2. ISOLANTES
                    if (!identificado) {
                        let achouBitola = false;
                        for (const bitola in ISOLAMENTO_PRECO) {
                            if (l.includes(bitola) && (l.includes('tubo') || l.includes('esponjoso') || l.includes('blindado') || l.includes('isolante') || l.includes('isolamento'))) {
                                const qtd = l.match(/(\d+)\s*(m|metro|metros)/) ? parseInt(l.match(/(\d+)\s*(m|metro|metros)/)[1]) : qtdLinha;
                                const chave = `iso-${bitola}`;
                                const existente = mapaItens.get(chave);
                                mapaItens.set(chave, {
                                    nome: `TUBO BLINDADO BRANCO ${bitola}`,
                                    qtdNumerica: (existente?.qtdNumerica || 0) + qtd,
                                    valorUnit: ISOLAMENTO_PRECO[bitola],
                                    tipo: 'iso'
                                });
                                achouBitola = true;
                                identificado = true; break;
                            }
                        }

                        // Isolamento generico (sem bitola)
                        if (!achouBitola && (l.includes('isolamento') || (l.includes('isolante') && !l.includes('fita')))) {
                            pedirIsolamentoGenerico = true;
                            identificado = true;
                        }
                    }

                    // 3. CABOS PP
                    if (!identificado) {
                        for (const bitola in CABOS) {
                            const bNorm = bitola.replace(',', '.');
                            const bEsp = bNorm.replace('x', 'x ');
                            if (l.includes(bNorm) || l.includes(bEsp) || l.includes(bitola)) {
                                const mMatch = l.match(/(\d+)\s*(m|metro|metros)/);
                                const qtd = mMatch ? parseInt(mMatch[1]) : qtdLinha;
                                const chave = `cabo-${bitola}`;
                                const existente = mapaItens.get(chave);
                                mapaItens.set(chave, {
                                    nome: CABOS[bitola].n,
                                    qtdNumerica: (existente?.qtdNumerica || 0) + qtd,
                                    valorUnit: CABOS[bitola].p,
                                    tipo: 'cabo'
                                });
                                identificado = true; break;
                            }
                        }
                    }

                    // 4. SUPORTES E CAIXAS
                    if (!identificado && l.includes('suporte')) {
                        let chaveSup = null;
                        for (const key in SUPORTES) {
                            if (l.includes(key)) {
                                chaveSup = key;
                                break;
                            }
                        }

                        // Se não encontrou suporte por nome, mas fala em "30" (ex: "Suporte condensadora 30"), usa o 500mm
                        if (!chaveSup && l.match(/\b30\b/)) {
                            chaveSup = '500mm';
                        }

                        if (chaveSup) {
                            const chave = `sup-${chaveSup}`;
                            const existente = mapaItens.get(chave);
                            mapaItens.set(chave, {
                                nome: SUPORTES[chaveSup].n,
                                qtdNumerica: (existente?.qtdNumerica || 0) + qtdLinha,
                                valorUnit: SUPORTES[chaveSup].p,
                                tipo: 'suporte'
                            });
                            identificado = true;
                        }
                    }

                    if (!identificado && l.includes('caixa')) {
                        let chaveCx = null;
                        for (const key in CAIXAS) {
                            if (l.includes(key)) {
                                chaveCx = key;
                                break;
                            }
                        }
                        if (chaveCx) {
                            const chave = `cx-${chaveCx}`;
                            const existente = mapaItens.get(chave);
                            mapaItens.set(chave, {
                                nome: CAIXAS[chaveCx].n,
                                qtdNumerica: (existente?.qtdNumerica || 0) + qtdLinha,
                                valorUnit: CAIXAS[chaveCx].p,
                                tipo: 'caixa'
                            });
                            identificado = true;
                        }
                    }

                    // 5. FITAS
                    if (!identificado) {
                        if (l.includes('pvc')) {
                            const chave = 'fita-pvc';
                            const ex = mapaItens.get(chave);
                            mapaItens.set(chave, { nome: FITAS.pvc.n, qtdNumerica: (ex?.qtdNumerica || 0) + qtdLinha, valorUnit: FITAS.pvc.p, tipo: 'fita' });
                            identificado = true;
                        } else if ((l.includes('isolante') || l.includes('fita iso')) && !l.includes('tubo') && !l.includes('isolamento')) {
                            const chave = 'fita-iso';
                            const ex = mapaItens.get(chave);
                            mapaItens.set(chave, { nome: FITAS.iso.n, qtdNumerica: (ex?.qtdNumerica || 0) + qtdLinha, valorUnit: FITAS.iso.p, tipo: 'fita' });
                            identificado = true;
                        }
                    }

                    if (!identificado) novosErros.push(linha);
                });

                // Adiciona isolamento para tudo que for cobre se foi pedido genericamente
                if (pedirIsolamentoGenerico) {
                    mapaItens.forEach((item, chave) => {
                        if (item.tipo === 'cobre') {
                            const bitola = item.bitola;
                            const metros = item.qtdNumerica;
                            const chaveIso = `iso-${bitola}`;
                            const existente = mapaItens.get(chaveIso);
                            mapaItens.set(chaveIso, {
                                nome: `TUBO BLINDADO BRANCO ${bitola}`,
                                qtdNumerica: (existente?.qtdNumerica || 0) + metros,
                                valorUnit: ISOLAMENTO_PRECO[bitola],
                                tipo: 'iso'
                            });
                        }
                    });
                }

                const itensFinais = [];
                mapaItens.forEach((item, chave) => {
                    let total = 0, qtdTexto = "", unidade = "";
                    if (item.tipo === 'cobre') {
                        const peso = item.qtdNumerica * COBRE_PESO[item.bitola];
                        total = peso * item.valorUnit;
                        qtdTexto = `${peso.toFixed(2)} kg (${item.qtdNumerica}m)`;
                        unidade = "kg";
                    } else {
                        total = item.qtdNumerica * item.valorUnit;
                        unidade = (item.tipo === 'cabo' || item.tipo === 'iso') ? 'm' : 'pç';
                        qtdTexto = `${item.qtdNumerica} ${unidade}`;
                    }
                    itensFinais.push({ id: chave, nome: item.nome, qtd: qtdTexto, valorUnit: item.valorUnit, unidade, total });
                });
                setItens(itensFinais); setErros(novosErros);
            };

            const copiarImagem = async () => {
                if (!tableRef.current) return;
                try {
                    // Adiciona uma classe temporária para forçar a largura antes do print
                    tableRef.current.classList.add('print-mode');

                    const canvas = await html2canvas(tableRef.current, {
                        backgroundColor: '#050505',
                        scale: 2, // High resolution
                        windowWidth: 1024, // Força render como se fosse tela de PC
                        width: 1024, // Fixa a largura do canvas independente do celular
                        onclone: (clonedDoc) => {
                            // Garante que o elemento no clone virtual tenha os tamanhos forçados
                            const clonedElement = clonedDoc.getElementById('resultado-orcamento');
                            if (clonedElement) {
                                clonedElement.style.width = '1024px';
                                clonedElement.style.minWidth = '1024px';
                            }
                        }
                    });

                    tableRef.current.classList.remove('print-mode');
                    canvas.toBlob(async (blob) => {
                        try {
                            await navigator.clipboard.write([
                                new ClipboardItem({ 'image/png': blob })
                            ]);
                            setCopiado(true);
                            setTimeout(() => setCopiado(false), 2000);
                        } catch (err) {
                            // Se a área de transferência falhar, força o download
                            const link = document.createElement('a');
                            link.download = 'cotacao.png';
                            link.href = canvas.toDataURL();
                            link.click();
                        }
                    }, 'image/png');
                } catch (err) {
                    alert('Erro ao gerar imagem.');
                    console.error(err);
                }
            };

            return (
                <div className="min-h-screen text-white p-4 sm:p-8">
                    <div className="max-w-5xl mx-auto">
                        <header className="mb-10 border-b border-white/5 pb-6">
                            <h1 className="text-[32px] font-black uppercase italic text-[#9BE20D] tracking-[-1px] mb-2 leading-none">COTAÇÃO EXPRESS</h1>
                            <p className="text-zinc-500 text-[11px] font-extrabold uppercase tracking-[1px]">SISTEMA DE ORÇAMENTOS INTELIGENTE</p>
                        </header>

                        <div className="flex flex-col gap-8">
                            {/* Sessão de Entrada (Topo) */}
                            <div className="space-y-6">
                                <div className="flex items-center justify-between gap-4">
                                    <div className="flex-1">
                                        <h2 className="text-[10px] font-bold uppercase tracking-widest text-zinc-400">Lista de Pedido</h2>
                                        <p className="text-[9px] text-zinc-600 italic">Itens duplicados são somados automaticamente.</p>
                                    </div>
                                    <div className="bg-zinc-900 border border-white/5 p-2 rounded-xl w-20 h-20 flex flex-col items-center justify-center border-b-2 border-[#9BE20D]">
                                        <span className="text-[7px] font-bold text-zinc-500">KG COBRE</span>
                                        <div className="flex items-center text-sm font-black">
                                            <span className="text-[#9BE20D] text-[10px] mr-1">R$</span>
                                            <input type="number" value={valorKgCobre} onChange={e => setValorKgCobre(Number(e.target.value))} className="bg-transparent w-full text-center outline-none" />
                                        </div>
                                    </div>
                                    <button onClick={processarOrcamento} className="tech-btn-green bg-[#9BE20D] text-black font-black px-8 py-4 rounded-xl uppercase tracking-widest hover:opacity-90 transition-all h-20">
                                        Gerar<br />Orçamento
                                    </button>
                                </div>

                                <textarea
                                    value={input} onChange={e => setInput(e.target.value)}
                                    placeholder="Copie os itens do orçamento e cole a lista aqui..."
                                    className="w-full h-40 bg-[#0A0A0A] border border-white/5 shadow-inner rounded-2xl p-6 text-sm outline-none focus:border-[#9BE20D] focus:shadow-[0_0_15px_rgba(155,226,13,0.1)] transition-all font-medium"
                                />

                                {erros.length > 0 && (
                                    <div className="bg-red-500/10 border border-red-500/20 p-4 rounded-xl text-[10px] text-red-400">
                                        <p className="font-bold uppercase mb-1">Não reconhecidos:</p>
                                        {erros.map((e, i) => <div key={i}>• {e}</div>)}
                                    </div>
                                )}
                            </div>

                            {/* Divisória */}
                            {itens.length > 0 && <div className="border-t border-white/5 my-4"></div>}

                            {/* Sessão de Orçamento (Baixo - Otimizada para Print) */}
                            {itens.length > 0 && (
                                <div className="space-y-4">
                                    <div className="flex justify-end">
                                        <button onClick={copiarImagem} className={`flex items-center gap-2 text-[10px] font-bold py-2 px-6 rounded-lg transition-all ${copiado ? 'bg-[#9BE20D] text-black scale-95' : 'bg-[#0A0A0A] border border-white/5 shadow-lg hover:border-white/20 text-white'}`}>
                                            <span>{copiado ? "✔ COPIADO COM SUCESSO" : "COPIAR IMAGEM"}</span>
                                        </button>
                                    </div>

                                    <div id="resultado-orcamento" ref={tableRef} className="space-y-6 top-0 p-8 pt-6 pb-6 bg-[#050505] rounded-3xl border border-white/5 w-full">
                                        <div className="text-center mb-4">
                                            <h2 className="text-2xl font-black uppercase italic text-[#9BE20D] tracking-widest">ORÇAMENTO</h2>
                                        </div>

                                        <div className="bg-[#0A0A0A] border border-white/5 rounded-2xl overflow-hidden shadow-2xl overflow-x-auto">
                                            <table className="w-full text-left text-xs min-w-[600px]">
                                                <thead>
                                                    <tr className="bg-white/5 text-zinc-500 uppercase font-bold text-[9px] tracking-wider">
                                                        <th className="p-5 pl-6">Produto</th>
                                                        <th className="p-5">Qtd</th>
                                                        <th className="p-5 font-bold text-center">Unitário</th>
                                                        <th className="p-5 pr-6 text-right">Total</th>
                                                    </tr>
                                                </thead>
                                                <tbody className="divide-y divide-white/5">
                                                    {itens.map(item => (
                                                        <tr key={item.id} className="hover:bg-white/5 transition-colors">
                                                            <td className="p-5 pl-6 font-bold text-zinc-200">{item.nome}</td>
                                                            <td className="p-5 text-zinc-400">
                                                                {item.qtd.split(' (').map((part, i) => (
                                                                    <span key={i} className={i === 1 ? 'block text-[10px] text-zinc-500' : ''}>
                                                                        {part.replace(')', '')}
                                                                    </span>
                                                                ))}
                                                            </td>
                                                            <td className="p-5 font-semibold text-center">
                                                                <span className="text-zinc-400">R$ {item.valorUnit.toFixed(2)}</span>
                                                                <span className="block text-[10px] text-zinc-600">/ {item.unidade}</span>
                                                            </td>
                                                            <td className="p-5 pr-6 text-right font-black text-white text-sm">
                                                                R$ {item.total.toFixed(2)}
                                                            </td>
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        </div>

                                        <div className="bg-[#9BE20D] p-6 rounded-2xl flex justify-between items-center text-black shadow-lg">
                                            <span className="font-bold uppercase text-[10px]">Total Geral</span>
                                            <span className="text-3xl font-black">R$ {totalGeral.toFixed(2)}</span>
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
