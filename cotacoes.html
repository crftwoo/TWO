<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cotação Ar Condicionado</title>
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💲</text></svg>">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;800;900&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --green: #9BE20D;
            --border: #1A1F24;
            --bg-color: #000000;
            --card-bg: #0B0F14;
            --text-primary: #fff;
            --text-secondary: #BFC3C7;
        }

        body {
            margin: 0;
            font-family: 'Montserrat', sans-serif;
            background: var(--bg-color);
            color: var(--text-primary);
            padding: 40px 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            animation: fadeIn 0.6s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1,
        h2,
        h3 {
            font-weight: 900;
            letter-spacing: -1px;
            text-transform: uppercase;
            color: var(--text-primary);
        }

        h1 {
            font-size: 36px;
            margin-bottom: 12px;
            border-bottom: 2px solid var(--border);
            padding-bottom: 10px;
        }

        h2 {
            font-size: 20px;
            margin-top: 32px;
            margin-bottom: 16px;
        }

        .sub {
            font-size: 16px;
            color: var(--text-secondary);
            margin-bottom: 40px;
            font-weight: 600;
        }

        label {
            font-weight: 800;
            font-size: 14px;
            margin-bottom: 8px;
            display: block;
            color: var(--text-secondary);
        }

        input[type="number"],
        textarea {
            width: 100%;
            background: var(--card-bg);
            color: var(--text-primary);
            border: 1px solid var(--border);
            padding: 16px;
            font-size: 15px;
            border-radius: 8px;
            font-family: 'Montserrat', sans-serif;
            transition: all 0.2s ease;
            outline: none;
        }

        textarea {
            height: 200px;
            resize: vertical;
        }

        input:focus,
        textarea:focus {
            border-color: var(--green);
            box-shadow: 0 0 0 3px rgba(155, 226, 13, 0.1);
        }

        input::placeholder,
        textarea::placeholder {
            color: #5f6b7a;
        }

        .button-group {
            display: flex;
            gap: 16px;
            margin-top: 24px;
            flex-wrap: wrap;
        }

        button {
            padding: 16px 32px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-weight: 800;
            font-size: 14px;
            cursor: pointer;
            background: transparent;
            color: var(--text-primary);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            font-family: 'Montserrat', sans-serif;
            text-transform: uppercase;
            width: 100%;
        }

        button:hover {
            border-color: #444;
        }

        .btn {
            background: var(--green);
            color: #000;
            border-color: var(--green);
        }

        .btn:hover {
            background: var(--green);
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(155, 226, 13, 0.3);
        }

        .btn:active {
            transform: translateY(0);
        }

        /* Tabela */
        .table-responsive {
            width: 100%;
            overflow-x: auto;
            background: var(--card-bg);
            border-radius: 8px;
            border: 1px solid var(--border);
            margin-top: 16px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        th,
        td {
            padding: 16px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }

        th {
            font-weight: 800;
            color: var(--text-secondary);
            text-transform: uppercase;
            background: rgba(255, 255, 255, 0.02);
        }

        tr:last-child td {
            border-bottom: none;
        }

        td {
            font-weight: 600;
        }

        #tot {
            text-align: right;
            font-size: 28px;
            margin-top: 24px;
            color: var(--green);
            text-transform: none;
            /* Mantém R$ */
        }

        .error-box {
            background: rgba(255, 50, 50, 0.1);
            border: 1px solid rgba(255, 50, 50, 0.3);
            padding: 16px;
            border-radius: 8px;
            margin-top: 20px;
            display: none;
        }

        .error-box h4 {
            color: #ff6b6b;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 800;
            text-transform: uppercase;
        }

        .error-box ul {
            margin-left: 20px;
            color: #ff9999;
            font-size: 14px;
            font-weight: 600;
        }

        @media (max-width: 768px) {
            body {
                padding: 24px 16px;
            }

            h1 {
                font-size: 28px;
            }

            .sub {
                font-size: 14px;
            }

            th,
            td {
                padding: 12px;
                font-size: 13px;
            }

            #tot {
                font-size: 22px;
            }
        }
    </style>
</head>

<body>

    <div class="container">

        <h1>Cotação de Materiais</h1>
        <div class="sub">Gere orçamentos rápidos colando a lista de pedido do cliente.</div>

        <h2>Configurações</h2>
        <label for="kg">Valor do KG do cobre (R$)</label>
        <input id="kg" type="number" value="155" step="0.01">

        <h2>1. Cole os itens</h2>
        <textarea id="txt"
            placeholder="Ex:&#10;1 panq 1/4&#10;1 panqueca 3/8&#10;2 caixa 29cm&#10;1 suporte evap&#10;5 fita pvc"></textarea>

        <div class="button-group">
            <button class="btn" onclick="run()">GERAR ORÇAMENTO</button>
        </div>

        <div class="error-box" id="errorBox">
            <h4>⚠️ Itens não reconhecidos:</h4>
            <ul id="errorList"></ul>
        </div>

        <h2 style="margin-top: 40px; border-bottom: 2px solid var(--border); padding-bottom: 10px;">Orçamento</h2>

        <div class="table-responsive">
            <table id="tab">
                <!-- O JS preenche a tabela aqui -->
            </table>
        </div>

        <h3 id="tot">TOTAL: R$ 0.00</h3>

    </div>

    <script>

        // ===== COBRE =====
        const cobrePeso = { "1/4": 0.123, "3/8": 0.19, "1/2": 0.263, "5/8": 0.26, "3/4": 0.40 };
        const isolamentoPreco = { "1/4": 1.89, "3/8": 1.99, "1/2": 2.59, "5/8": 3.69, "3/4": 3.89 };

        // ===== FITAS =====
        const fitas = {
            pvc: { n: "FITA PVC S/ADESIVO 100MMX10M BRANCA HULTER", p: 3.90 },
            iso: { n: "FITA ISOLANTE 18MM X 15M ANTICHAMA PRETA DUGOLD", p: 4.90 },
            alu: { n: "FITA ALUMINIZADA 45MM X 45M HULTER", p: 4.95 }
        };

        // ===== CABO PP =====
        const cabos = {
            "2x1,5": { n: "CABO PP 2X1,5MM 1KV 100M RCM", p: 5.50 },
            "3x1,5": { n: "CABO PP 3X1,5MM 1KV 100M RCM", p: 7.80 },
            "4x1,5": { n: "CABO PP 4X1,5MM 1KV 100M RCM", p: 9.80 },
            "5x1,5": { n: "CABO PP CONTROLE 5X1,5MM 1KV 100M RCM", p: 13.80 },
            "6x1,5": { n: "CABO PP CONTROLE 6X1,5MM 1KV 100M RCM", p: 21.70 }
        };

        // ===== SUPORTES =====
        const suportes = {
            "400mm": { n: "Suporte Split Hulter 7 à 12.000 BTUs 400mm", p: 29.90 },
            "450mm": { n: "Suporte para Condensadora Barril 7000 a 12000 BTUS 450mm Hulter", p: 39.90 },
            "500mm": { n: "Suporte 50cm para Split 12000 a 24000 BTUs 80 kg 500mm Hulter", p: 49.90 },
            "600mm": { n: "Suporte Split Barril 60 x 50 cm 18000 a 48000 BTUs 160 kg 600mm Hulter", p: 119.00 },
            "900mm": { n: "Suporte Split Hulter 18 à 60.000 BTUs 900mm x 600mm", p: 189.00 },
            "evap": { n: "Suporte Evaporadora Piso teto Hulter 30 à 80.000 BTUs 600mm x230mm x 200mm", p: 99.00 }
        };

        // ===== CAIXAS =====
        const caixas = {
            "29": { n: "Caixa de Passagem Split 29cm x 17 Reversível Hulter", p: 13.90 },
            "39": { n: "Caixa de Passagem Split 39cm x 17 Reversível Hulter", p: 18.90 }
        };

        function isoRound(m) { return Math.ceil(m / 2) * 2; }

        function run() {
            let linhas = document.getElementById("txt").value.toLowerCase().split("\n");
            let kg = Number(document.getElementById("kg").value || 155);

            let tab = document.getElementById("tab");
            tab.innerHTML = "<tr><th>Produto</th><th>Qtd</th><th>Valor Unit.</th><th>Total</th></tr>";

            let total = 0;
            let erros = [];

            for (let l of linhas) {
                if (!l.trim()) continue;

                let ok = false;

                // ===== COBRE =====
                for (let b in cobrePeso) {
                    if (l.includes(b)) {
                        // Correção: Deixar panqueca opcional sem conflitar com metros. Pode ser "1 panqueca 1/4" ou "1 panq"
                        let pan = l.match(/(\d+)?\s*(panq|panc|panqueca)/);
                        let m = l.match(/(\d+)\s*(m|metro|metros)/);

                        let qtdPan = pan ? (pan[1] ? Number(pan[1]) : 1) : 0;
                        let metros = pan ? qtdPan * 15 : (m ? Number(m[1]) : 0);

                        if (metros > 0) {
                            ok = true;
                            let pesoCobre = metros * cobrePeso[b];
                            let sub = pesoCobre * kg;
                            total += sub;

                            tab.innerHTML += `<tr><td>CANO COBRE ${b}</td><td>${pesoCobre.toFixed(2)} kg (${metros} m)</td><td>R$ ${kg.toFixed(2)} /kg</td><td>R$ ${sub.toFixed(2)}</td></tr>`;

                            let iso = isoRound(metros);
                            let subIso = iso * isolamentoPreco[b];
                            total += subIso;

                            tab.innerHTML += `<tr><td>TUBO BLIND BRANCO INVERTER ${b}</td><td>${iso} m</td><td>R$ ${isolamentoPreco[b].toFixed(2)}</td><td>R$ ${subIso.toFixed(2)}</td></tr>`;
                        }
                    }
                }

                // ===== FITAS =====
                if (!ok) {
                    let pvc = l.match(/(\d+)?\s*(pvc|fita pvc)/);
                    if (pvc) {
                        let q = pvc[1] ? Number(pvc[1]) : 1; let s = q * fitas.pvc.p; total += s; ok = true;
                        tab.innerHTML += `<tr><td>${fitas.pvc.n}</td><td>${String(q).padStart(2, "0")} pç</td><td>R$ ${fitas.pvc.p.toFixed(2)}</td><td>R$ ${s.toFixed(2)}</td></tr>`;
                    }

                    let iso = l.match(/(\d+)?\s*(fita isolante)/);
                    if (iso && !ok) {
                        let q = iso[1] ? Number(iso[1]) : 1; let s = q * fitas.iso.p; total += s; ok = true;
                        tab.innerHTML += `<tr><td>${fitas.iso.n}</td><td>${String(q).padStart(2, "0")} pç</td><td>R$ ${fitas.iso.p.toFixed(2)}</td><td>R$ ${s.toFixed(2)}</td></tr>`;
                    }

                    let alu = l.match(/(\d+)?\s*(fita aluminizada|aluminizada)/);
                    if (alu && !ok) {
                        let q = alu[1] ? Number(alu[1]) : 1; let s = q * fitas.alu.p; total += s; ok = true;
                        tab.innerHTML += `<tr><td>${fitas.alu.n}</td><td>${String(q).padStart(2, "0")} pç</td><td>R$ ${fitas.alu.p.toFixed(2)}</td><td>R$ ${s.toFixed(2)}</td></tr>`;
                    }
                }

                // ===== CABO =====
                if (!ok) {
                    for (let c in cabos) {
                        let cAlt = c.replace(",", ".");
                        if (l.includes(cAlt) || l.includes(c)) {
                            let m = l.match(/(\d+)\s*(m|metro|metros|cabo)/); // permite 20m ou 20 cabo pp ...
                            let fallback = l.match(/(\d+)/);
                            let num = m ? Number(m[1]) : (fallback ? Number(fallback[1]) : 1);

                            let s = num * cabos[c].p;
                            total += s;
                            tab.innerHTML += `<tr><td>${cabos[c].n}</td><td>${num} m</td><td>R$ ${cabos[c].p.toFixed(2)} /m</td><td>R$ ${s.toFixed(2)}</td></tr>`;
                            ok = true;
                            break;
                        }
                    }
                }

                // ===== SUPORTE =====
                if (!ok && l.includes("suporte")) {
                    // Correcao suporte evap sem numero virar 1 pc
                    let isEvap = l.includes("evap");
                    if (isEvap) {
                        let qNum = l.match(/(\d+)/);
                        let q = qNum ? Number(qNum[1]) : 1;
                        let s = q * suportes["evap"].p; total += s;
                        tab.innerHTML += `<tr><td>${suportes["evap"].n}</td><td>${String(q).padStart(2, "0")} pç</td><td>R$ ${suportes["evap"].p.toFixed(2)}</td><td>R$ ${s.toFixed(2)}</td></tr>`;
                        ok = true;
                    } else {
                        for (let t in suportes) {
                            if (l.includes(t) && t !== "evap") {
                                let qNum = l.match(/(\d+)/);
                                let q = qNum ? Number(qNum[1]) : 1;
                                let s = q * suportes[t].p; total += s;
                                tab.innerHTML += `<tr><td>${suportes[t].n}</td><td>${String(q).padStart(2, "0")} pç</td><td>R$ ${suportes[t].p.toFixed(2)}</td><td>R$ ${s.toFixed(2)}</td></tr>`;
                                ok = true;
                                break;
                            }
                        }
                    }
                }

                // ===== CAIXA =====
                if (!ok && l.includes("caixa")) {
                    for (let c in caixas) {
                        if (l.includes(c)) {
                            // Correção Caixa: Se escrever "caixa 29cm" pega "29" como qtd se nao isolar a busca.
                            // Vamos procurar algo como "X caixa" ou no pior dos casos "1" se so ter o tamanho.
                            let qMatch = l.match(/(\d+)\s*caixa/);
                            let q = qMatch ? Number(qMatch[1]) : 1;
                            let s = q * caixas[c].p; total += s;
                            tab.innerHTML += `<tr><td>${caixas[c].n}</td><td>${String(q).padStart(2, "0")} pç</td><td>R$ ${caixas[c].p.toFixed(2)}</td><td>R$ ${s.toFixed(2)}</td></tr>`;
                            ok = true;
                            break;
                        }
                    }
                }

                if (!ok) {
                    erros.push(l);
                }

            } // fim for linhas

            document.getElementById("tot").innerText = "TOTAL: R$ " + total.toFixed(2);

            let eBox = document.getElementById("errorBox");
            let eList = document.getElementById("errorList");
            eList.innerHTML = "";
            if (erros.length > 0) {
                erros.forEach(e => {
                    let li = document.createElement("li");
                    li.textContent = e;
                    eList.appendChild(li);
                });
                eBox.style.display = "block";
            } else {
                eBox.style.display = "none";
            }

        }

    </script>

</body>

</html>
