<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Busca Ar-Condicionado</title>
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⇄</text></svg>">

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;800;900&display=swap');

    :root {
      --green: #9BE20D;
      --border: #1A1F24;
      --bg-color: #000000;
      --card-bg: #0B0F14;
    }

    body {
      margin: 0;
      padding: 20px;
      font-family: 'Montserrat', sans-serif;
      background: var(--bg-color);
      color: #fff;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding-bottom: 60px;
    }

    h2 {
      font-weight: 900;
      margin: 40px 0 20px;
      text-transform: uppercase;
      letter-spacing: -0.5px;
      font-size: 28px;
      border-bottom: 2px solid var(--border);
      padding-bottom: 10px;
    }

    .section {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }

    button {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 8px;
      /* Mais quadrado estilo Nike */
      cursor: pointer;
      padding: 16px 24px;
      color: #fff;
      font-weight: 800;
      text-transform: uppercase;
      transition: all 0.2s ease;
    }

    button:hover {
      border-color: #444;
    }

    button.selecionado {
      background: var(--green);
      color: #000;
      border-color: var(--green);
      transform: translateY(-2px);
      box-shadow: 0 8px 15px rgba(155, 226, 13, 0.3);
    }

    .tipo-btn {
      width: 180px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .icon-svg {
      width: 100px;
      height: 100px;
      stroke: var(--text-secondary, #BFC3C7);
      transition: all 0.3s ease;
    }

    .tipo-btn:hover .icon-svg {
      transform: scale(1.05);
      stroke: #fff;
    }

    .tipo-btn.selecionado .icon-svg {
      stroke: #000;
      color: #000;
    }

    .air-flow {
      stroke: #4bd8ff;
      transition: all 0.3s ease;
    }

    .tipo-btn.selecionado .air-flow {
      stroke: #000;
    }

    #resultados {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
    }

    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      padding: 24px;
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      transition: transform 0.2s ease;
    }

    .card:hover {
      transform: translateY(-4px);
      border-color: #333;
    }

    .card strong {
      font-weight: 800;
      font-size: 18px;
      margin-bottom: 16px;
      display: block;
    }

    .card a {
      text-decoration: none;
      width: 100%;
    }

    .card button {
      width: 100%;
      background: #fff;
      color: #000;
      border: none;
    }

    .card button:hover {
      background: var(--green);
      color: #000;
      transform: translateY(-2px);
    }

    @media (max-width: 768px) {
      body {
        padding: 16px;
      }

      .section {
        flex-direction: column;
      }

      .tipo-btn,
      .section button {
        width: 100%;
      }

      .tipo-btn img {
        width: 120px;
      }

      #resultados {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>Busca Ar-Condicionado</h1>
    <div class="sub">Buscador de preços de ar condicionado.</div>

    <h2>Selecione o Tipo</h2>
    <div id="tipos" class="section"></div>

    <h2>Selecione os BTUs</h2>
    <div id="btus" class="section"></div>

    <h2>Selecione o Ciclo</h2>
    <div id="ciclos" class="section"></div>

    <h2>Resultados</h2>
    <div id="resultados"></div>
  </div>

  <script>
    let dados = [], tipoSelecionado = null, btusSelecionado = null, cicloSelecionado = null;
    let ativoTipo = null, ativoBtu = null, ativoCiclo = null;

    const svgsTipos = {
      "Hiwall": `<svg viewBox="0 0 24 24" fill="none" class="icon-svg" stroke-width="1.5" stroke-linejoin="round"><path d="M3 6 C3 4.5 4 4 5 4 L19 4 C20 4 21 4.5 21 6 L21 11 C21 13 20 14 19 14 L5 14 C4 14 3 13 3 11 Z" stroke-width="2"></path><line x1="4" y1="10" x2="20" y2="10"></line><line x1="5" y1="12" x2="19" y2="12"></line><line x1="11" y1="7" x2="13" y2="7" stroke-width="2"></line><path d="M9 16s-1 1.5 0 3s-1 2 0 3" stroke-linecap="round" class="air-flow"></path><path d="M12 16s-1 1.5 0 3s-1 2 0 3" stroke-linecap="round" class="air-flow"></path><path d="M15 16s-1 1.5 0 3s-1 2 0 3" stroke-linecap="round" class="air-flow"></path></svg>`,
      "Hi Wall": `<svg viewBox="0 0 24 24" fill="none" class="icon-svg" stroke-width="1.5" stroke-linejoin="round"><path d="M3 6 C3 4.5 4 4 5 4 L19 4 C20 4 21 4.5 21 6 L21 11 C21 13 20 14 19 14 L5 14 C4 14 3 13 3 11 Z" stroke-width="2"></path><line x1="4" y1="10" x2="20" y2="10"></line><line x1="5" y1="12" x2="19" y2="12"></line><line x1="11" y1="7" x2="13" y2="7" stroke-width="2"></line><path d="M9 16s-1 1.5 0 3s-1 2 0 3" stroke-linecap="round" class="air-flow"></path><path d="M12 16s-1 1.5 0 3s-1 2 0 3" stroke-linecap="round" class="air-flow"></path><path d="M15 16s-1 1.5 0 3s-1 2 0 3" stroke-linecap="round" class="air-flow"></path></svg>`,
      "Piso Teto": `<svg viewBox="0 0 24 24" fill="none" class="icon-svg" stroke-width="1.5" stroke-linejoin="round"><path d="M3 5 Q3 4 5 4 L20 4 Q22 4 22 6 L22 9 L17 14 Q16.5 14.5 15.5 14.5 L5 14.5 Q3 14.5 3 12.5 Z" stroke-width="2"></path><rect x="5" y="7" width="13" height="3" rx="1"></rect><line x1="10" y1="12" x2="12" y2="12" stroke-width="2"></line><path d="M9.5 16.5s-1 1.5 0 3s-1 2 0 3" stroke-linecap="round" class="air-flow"></path><path d="M12.5 16.5s-1 1.5 0 3s-1 2 0 3" stroke-linecap="round" class="air-flow"></path><path d="M15.5 16.5s-1 1.5 0 3s-1 2 0 3" stroke-linecap="round" class="air-flow"></path></svg>`,
      "Cassete": `<svg viewBox="0 0 24 24" fill="none" class="icon-svg" stroke-width="1.5" stroke-linejoin="round"><path d="M2 11 L12 7 L12 4 L2 8 Z" fill="currentColor" fill-opacity="0.1" stroke="none"></path><path d="M22 11 L12 7 L12 4 L22 8 Z" fill="currentColor" fill-opacity="0.2" stroke="none"></path><path d="M2 11 L2 8 L12 4 L22 8 L22 11"></path><line x1="12" y1="4" x2="12" y2="7"></line><path d="M12 7 L23 11.5 L12 16 L1 11.5 Z" stroke-width="2" fill="var(--card-bg, #0B0F14)"></path><path d="M12 8.5 L19.5 11.5 L12 14.5 L4.5 11.5 Z"></path><path d="M12 10 L16.5 11.75 L12 13.5 L7.5 11.75 Z" fill="currentColor" fill-opacity="0.2" stroke="none"></path><path d="M9 18s-1 1-0 2s-1 1 0 2" stroke-linecap="round" class="air-flow"></path><path d="M12 18s-1 1-0 2s-1 1 0 2" stroke-linecap="round" class="air-flow"></path><path d="M15 18s-1 1-0 2s-1 1 0 2" stroke-linecap="round" class="air-flow"></path></svg>`
    };

    fetch("https://opensheet.elk.sh/1ml7XpwZfzM4ElRJb4G62b93VMqUw3jeprTtgxdigiD8/Sheet1")
      .then(r => r.json()).then(j => { dados = j; gerarTipos(); });

    function scrollPara(id) {
      document.getElementById(id).scrollIntoView({ behavior: "smooth" });
    }

    function gerarTipos() {
      const tipos = [...new Set(dados.map(i => i.Tipo))];
      const div = document.getElementById("tipos");
      div.innerHTML = "";
      tipos.forEach(t => {
        const b = document.createElement("button");
        b.className = "tipo-btn";
        b.innerHTML = `${svgsTipos[t] || ''}<span>${t}</span>`;
        b.onclick = () => {
          if (ativoTipo) ativoTipo.classList.remove("selecionado");
          b.classList.add("selecionado");
          ativoTipo = b;
          tipoSelecionado = t;
          document.getElementById("btus").innerHTML = "";
          document.getElementById("ciclos").innerHTML = "";
          document.getElementById("resultados").innerHTML = "";
          gerarBTUs();
          scrollPara("btus");
        };
        div.appendChild(b);
      });
    }

    function gerarBTUs() {
      const btus = [...new Set(dados.filter(i => i.Tipo === tipoSelecionado).map(i => i.BTUs))];
      const div = document.getElementById("btus");
      div.innerHTML = "";
      btus.forEach(b => {
        const bt = document.createElement("button");
        bt.textContent = b + " BTUs";
        bt.onclick = () => {
          if (ativoBtu) ativoBtu.classList.remove("selecionado");
          bt.classList.add("selecionado");
          ativoBtu = bt;
          btusSelecionado = b;
          document.getElementById("ciclos").innerHTML = "";
          document.getElementById("resultados").innerHTML = "";
          gerarCiclos();
          scrollPara("ciclos");
        };
        div.appendChild(bt);
      });
    }

    function gerarCiclos() {
      const ciclos = [...new Set(dados.filter(i => i.Tipo === tipoSelecionado && i.BTUs == btusSelecionado).map(i => i.Ciclo))];
      const div = document.getElementById("ciclos");
      div.innerHTML = "";
      ciclos.forEach(c => {
        const bt = document.createElement("button");
        bt.textContent = c;
        bt.onclick = () => {
          if (ativoCiclo) ativoCiclo.classList.remove("selecionado");
          bt.classList.add("selecionado");
          ativoCiclo = bt;
          cicloSelecionado = c;
          gerarResultados();
          scrollPara("resultados");
        };
        div.appendChild(bt);
      });
    }

    function gerarResultados() {
      const res = dados.filter(i => i.Tipo === tipoSelecionado && i.BTUs == btusSelecionado && i.Ciclo === cicloSelecionado);
      const div = document.getElementById("resultados");
      div.innerHTML = "";
      res.forEach(i => {
        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `<strong>${i.Site}</strong><br><br>
    <a href="${i.Link}" target="_blank"><button>Abrir pesquisa</button></a>`;
        div.appendChild(card);
      });
    }
  </script>

</body>

</html>
