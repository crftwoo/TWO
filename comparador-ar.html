<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Busca Ar-Condicionado</title>
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⇄</text></svg>">

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;800;900&display=swap');

    * {
      box-sizing: border-box;
    }

    :root {
      --green: #9BE20D;
      --border: rgba(255, 255, 255, 0.05);
      --bg-color: #050505;
      --card-bg: #0A0A0A;
      --text-secondary: #71717a;
    }

    body {
      margin: 0;
      padding: 40px 20px;
      font-family: 'Montserrat', sans-serif;
      background: var(--bg-color);
      color: #fff;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding-bottom: 80px;
      animation: fadeIn 0.6s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    h1 {
      font-size: 32px;
      font-weight: 900;
      margin-bottom: 8px;
      letter-spacing: -1px;
      text-transform: uppercase;
      font-style: italic;
      color: var(--green);
    }

    .sub-head {
      font-size: 11px;
      color: var(--text-secondary);
      margin-bottom: 40px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 24px;
    }

    h2 {
      font-weight: 900;
      margin: 48px 0 24px;
      text-transform: uppercase;
      letter-spacing: -0.5px;
      font-size: 18px;
    }

    .section {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }

    button {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      cursor: pointer;
      padding: 16px 32px;
      color: #fff;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-size: 12px;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
      font-family: 'Montserrat', sans-serif;
    }

    button:hover {
      border-color: rgba(255, 255, 255, 0.2);
      transform: translateY(-2px);
    }

    button.selecionado {
      background: var(--green);
      color: #000;
      border-color: var(--green);
      transform: translateY(-2px);
      box-shadow: 0 8px 15px rgba(155, 226, 13, 0.3);
    }

    .tipo-btn {
      width: 180px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      padding: 24px 16px;
    }

    .tipo-btn.selecionado {
      background: var(--green);
      color: #000;
      border-color: var(--green);
    }

    .tipo-btn img {
      width: 140px;
      mix-blend-mode: lighten;
      filter: contrast(1.6) brightness(0.7) drop-shadow(0 0 4px rgba(75, 216, 255, 0.2));
      transition: transform 0.3s ease, filter 0.3s ease;
    }

    .tipo-btn:hover img {
      transform: scale(1.05);
      filter: contrast(1.8) brightness(0.9) drop-shadow(0 0 8px rgba(75, 216, 255, 0.4));
    }

    .tipo-btn.selecionado img {
      filter: contrast(1.8) brightness(1.1);
      mix-blend-mode: normal;
      /* remove the lighten on green bg for better view or keep it if png handles it */
    }

    #resultados {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 24px;
    }

    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      padding: 32px;
      border-radius: 20px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      transition: all 0.3s ease;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    }

    .card:hover {
      transform: translateY(-4px);
      border-color: rgba(255, 255, 255, 0.1);
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.8);
    }

    .card strong {
      font-weight: 800;
      font-size: 16px;
      margin-bottom: 24px;
      display: block;
      color: #fff;
      text-transform: uppercase;
      letter-spacing: -0.5px;
    }

    .card a {
      text-decoration: none;
      width: 100%;
    }

    .card button {
      width: 100%;
      background: rgba(255, 255, 255, 0.05);
      color: #fff;
      border: 1px solid var(--border);
    }

    .card button:hover {
      background: var(--green);
      color: #000;
      border-color: var(--green);
      transform: translateY(-2px);
      box-shadow: 0 8px 15px rgba(155, 226, 13, 0.25);
    }

    /* Styles for the multiple compare section */
    .compare-section {
      margin-top: 60px;
      padding-top: 40px;
      border-top: 2px dashed rgba(255, 255, 255, 0.1);
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    .compare-actions {
      display: flex;
      gap: 16px;
      margin-bottom: 32px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .badge-store {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 12px;
    }

    .badge-dufrio {
      background: #0056b3;
      color: white;
    }

    .badge-leveros {
      background: #009038;
      color: white;
    }

    .badge-centralar {
      background: #005ca8;
      color: white;
    }

    .compare-copy-btn {
      width: auto !important;
      margin: 32px auto 0 !important;
      background: var(--green) !important;
      color: #000 !important;
    }

    .badge-inline {
      display: inline-block;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 1px;
      vertical-align: middle;
      opacity: 0.8;
      margin-left: 8px;
    }

    .badge-inline.dufrio {
      background: #0056b3;
      color: white;
    }

    .badge-inline.leveros {
      background: #009038;
      color: white;
    }

    .badge-inline.centralar {
      background: #005ca8;
      color: white;
    }

    .fake-textarea {
      width: 100%;
      height: 350px;
      background: #0A0A0A;
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 20px;
      font-family: 'Montserrat', sans-serif;
      font-size: 14px;
      margin-bottom: 24px;
      overflow-y: auto;
      line-height: 1.5;
      text-align: left;
      white-space: pre-wrap;
    }

    @media (max-width: 768px) {
      body {
        padding: 24px 16px;
      }

      h1 {
        font-size: 28px;
      }

      .sub-head {
        margin-bottom: 24px;
        padding-bottom: 16px;
      }

      .section {
        flex-direction: column;
        gap: 12px;
      }

      .tipo-btn,
      .section button {
        width: 100%;
      }

      .tipo-btn {
        padding: 16px;
        flex-direction: row;
        justify-content: space-between;
      }

      .tipo-btn img {
        width: 100px;
      }

      #resultados {
        grid-template-columns: 1fr;
      }

      .card {
        padding: 24px;
      }
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>Busca Ar-Condicionado</h1>
    <div class="sub-head">Buscador de preços de ar condicionado.</div>

    <h2>Selecione o Tipo</h2>
    <div id="tipos" class="section"></div>

    <h2>Selecione os BTUs</h2>
    <div id="btus" class="section"></div>

    <h2>Selecione o Ciclo</h2>
    <div id="ciclos" class="section"></div>

    <h2>Resultados</h2>
    <div id="resultados"></div>

    <div class="compare-section" id="compare-section">
      <h2>Comparador Ao Vivo (Da Extensão)</h2>
      <div class="sub-head">A caixa atualiza sozinha quando você joga os itens da extensão pra cá!</div>

      <div id="caixa-comparador" class="fake-textarea">Nenhum produto enviado pela extensão ainda...</div>

      <div class="compare-actions">
        <button id="btn-organizar" onclick="organizarTudo()"
          style="border-color: var(--green); color: var(--green);">Organizar Todos pelo Menor Preço 🏆</button>
        <button onclick="copiarCaixa(this)"
          style="background: var(--green); color: #000; border-color: var(--green);">Copiar Texto da Caixa 📋</button>
        <button onclick="limparComparador()" style="border-color: #ff4444; color: #ff4444;">Limpar Lojas Salvas
          🗑️</button>
      </div>
    </div>
  </div>

  <script>
    let dados = [], tipoSelecionado = null, btusSelecionado = null, cicloSelecionado = null;
    let ativoTipo = null, ativoBtu = null, ativoCiclo = null;

    const imagens = {
      "Hiwall": "img/hi_wall.png",
      "Hi Wall": "img/hi_wall.png",
      "Piso Teto": "img/piso_teto.png",
      "Cassete": "img/cassete.png"
    };

    fetch("https://opensheet.elk.sh/1LLVFTzxoSakgqnjS_ws7GgYNKdEqP26H0Z7Fe5DEmcc/Página1")
      .then(r => r.json()).then(j => { dados = j; gerarTipos(); });

    function scrollPara(id) {
      document.getElementById(id).scrollIntoView({ behavior: "smooth" });
    }

    function gerarTipos() {
      const tipos = [...new Set(dados.map(i => i.Tipo))];
      const div = document.getElementById("tipos");
      div.innerHTML = "";
      tipos.forEach(t => {
        const b = document.createElement("button");
        b.className = "tipo-btn";
        b.innerHTML = `<div class="img-wrapper"><img src="${imagens[t] || ''}"></div><span>${t}</span>`;
        b.onclick = () => {
          if (ativoTipo) ativoTipo.classList.remove("selecionado");
          b.classList.add("selecionado");
          ativoTipo = b;
          tipoSelecionado = t;
          document.getElementById("btus").innerHTML = "";
          document.getElementById("ciclos").innerHTML = "";
          document.getElementById("resultados").innerHTML = "";
          gerarBTUs();
          scrollPara("btus");
        };
        div.appendChild(b);
      });
    }

    function gerarBTUs() {
      const btus = [...new Set(dados.filter(i => i.Tipo === tipoSelecionado).map(i => i.BTUs))];
      const div = document.getElementById("btus");
      div.innerHTML = "";
      btus.forEach(b => {
        const bt = document.createElement("button");
        bt.textContent = b + " BTUs";
        bt.onclick = () => {
          if (ativoBtu) ativoBtu.classList.remove("selecionado");
          bt.classList.add("selecionado");
          ativoBtu = bt;
          btusSelecionado = b;
          document.getElementById("ciclos").innerHTML = "";
          document.getElementById("resultados").innerHTML = "";
          gerarCiclos();
          scrollPara("ciclos");
        };
        div.appendChild(bt);
      });
    }

    function gerarCiclos() {
      const ciclos = [...new Set(dados.filter(i => i.Tipo === tipoSelecionado && i.BTUs == btusSelecionado).map(i => i.Ciclo))];
      const div = document.getElementById("ciclos");
      div.innerHTML = "";
      ciclos.forEach(c => {
        const bt = document.createElement("button");
        bt.textContent = c;
        bt.onclick = () => {
          if (ativoCiclo) ativoCiclo.classList.remove("selecionado");
          bt.classList.add("selecionado");
          ativoCiclo = bt;
          cicloSelecionado = c;
          gerarResultados();
          scrollPara("resultados");
        };
        div.appendChild(bt);
      });
    }

    function gerarResultados() {
      const res = dados.filter(i => i.Tipo === tipoSelecionado && i.BTUs == btusSelecionado && i.Ciclo === cicloSelecionado);
      const div = document.getElementById("resultados");
      div.innerHTML = "";
      res.forEach(i => {
        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `<strong>${i.Site}</strong><br><br>
    <a href="${i.Link}" target="_blank"><button>Abrir pesquisa</button></a>`;
        div.appendChild(card);
      });
    }

    // ====== LÓGICA DE INTEGRAÇÃO COM A EXTENSÃO ======

    let dadosExtensaoBrutos = {};
    let activeRequest = null;
    let isSorted = false; // Controla se estamos vendo por loja ou todos unificados e sorteados

    // Escuta a resposta e atualizações automáticas do bridge.js
    window.addEventListener("message", (event) => {
      if (event.source !== window || !event.data || event.data.type !== "TWO_RETURN_COMPARADOR_DATA") return;

      const receivedData = event.data.data;
      dadosExtensaoBrutos = receivedData || {};

      // Se chegou algo da extensão (seja primeira vez ou nova loja), reseta a visualização
      isSorted = false;
      renderizarCaixa();
    });

    // Assim que a página abre, espera 1s para o bridge injetar e pede os dados salvos
    setTimeout(() => {
      window.postMessage({ type: "TWO_GET_COMPARADOR_DATA", id: Date.now() }, "*");
    }, 1000);

    // Helpers para formatar (idênticos à extensão)
    function extractProductInfo(titleStr) {
      const titleLower = titleStr.toLowerCase();
      let btuVal = null;
      const btuMatch = titleLower.match(/(\d{1,2}\.?\d{3})\s*btus?/);
      if (btuMatch) btuVal = parseInt(btuMatch[1].replace('.', ''), 10);

      const isQF = titleLower.includes('quente/frio') || titleLower.includes('quente e frio') || titleLower.includes('quente/ frio') || titleLower.includes('quente / frio') || titleLower.includes('quente frio') || titleLower.includes('q/f');
      const isSF = titleLower.includes('frio') && !isQF;

      let type = 'Ar Condicionado';
      if (titleLower.includes('teto')) type = 'Piso Teto';
      else if (titleLower.includes('cassete')) type = 'Cassete';
      else if (titleLower.includes('janela')) type = 'de Janela';
      else if (titleLower.includes('portátil') || titleLower.includes('portatil')) type = 'Portátil';
      else if (titleLower.includes('multi')) type = 'Multi Split';
      else if (titleLower.includes('split') || titleLower.includes('hiwall') || titleLower.includes('hi-wall') || titleLower.includes('hi wall')) type = 'Hiwall';

      return { btuVal, isQF, isSF, type };
    }

    function generateSmartTitle(productsList) {
      if (!productsList || productsList.length === 0) return 'Comparativo de Ar Condicionado';
      const typesStats = {};
      productsList.forEach(p => {
        const info = extractProductInfo(p.title);
        if (!typesStats[info.type]) typesStats[info.type] = { minBtu: Infinity, maxBtu: -Infinity, hasQF: false, hasSF: false };
        if (info.btuVal) {
          if (info.btuVal < typesStats[info.type].minBtu) typesStats[info.type].minBtu = info.btuVal;
          if (info.btuVal > typesStats[info.type].maxBtu) typesStats[info.type].maxBtu = info.btuVal;
        }
        if (info.isQF) typesStats[info.type].hasQF = true;
        if (info.isSF) typesStats[info.type].hasSF = true;
      });

      const orderedTypes = ['Hiwall', 'Piso Teto', 'Cassete', 'de Janela', 'Portátil', 'Multi Split', 'Ar Condicionado'];
      const formatInt = (n) => n.toLocaleString('pt-BR', { maximumFractionDigits: 0 });
      let titleLines = [];

      orderedTypes.forEach(t => {
        if (typesStats[t]) {
          const stats = typesStats[t];
          let btuString = "";
          if (stats.minBtu !== Infinity && stats.maxBtu !== -Infinity) {
            if (stats.minBtu === stats.maxBtu) btuString = `${formatInt(stats.minBtu)} Btus`;
            else btuString = `${formatInt(stats.minBtu)} a ${formatInt(stats.maxBtu)} Btus`;
          }
          let cicloString = "";
          let emoji = "";
          if (stats.hasQF && stats.hasSF) { cicloString = ""; emoji = ""; }
          else if (stats.hasQF) { cicloString = "Quente/Frio"; emoji = "🔥❄️ "; }
          else if (stats.hasSF) { cicloString = "Só Frio"; emoji = "❄️ "; }

          const parts = [t];
          if (btuString) parts.push(btuString);
          if (cicloString) parts.push(cicloString);
          titleLines.push(`${emoji}${parts.join(' · ')}`.trim());
        }
      });
      return titleLines.join('\n');
    }

    function formatProductText(title, spot, install) {
      let emojiCycle = "❄️";
      const titleLower = title.toLowerCase();
      if (titleLower.includes('quente/frio') || titleLower.includes('quente e frio') || titleLower.includes('quente/ frio') || titleLower.includes('quente / frio') || titleLower.includes('quente frio') || titleLower.includes('q/f')) {
        emojiCycle = "🔥❄️";
      }
      return `${emojiCycle} ${title}\n💰 ${spot}\n💳 ${install}`;
    }

    function parseSpotPrice(priceStr) {
      if (!priceStr) return Infinity;
      const match = priceStr.match(/R\$\s*([\d\.,]+)/);
      if (match) {
        let numStr = match[1].replace(/\./g, '').replace(',', '.');
        return parseFloat(numStr) || Infinity;
      }
      return Infinity;
    }

    // Variável global para guardar o conteúdo de texto limpo para o botão Copiar
    let clipboardTextClean = "";

    function limparComparador() {
      if (confirm("Tem certeza que quer limpar todos os dados salvos da extensão no Comparador?")) {
        // Remove do local storage da extensao mandando a mensagem indiretamente via nova action
        // Mas como nós nao temos como escrever via bridge direto (bridge nao tem permissions),
        // Pelo menos limpamos o state atual
        dadosExtensaoBrutos = {};
        isSorted = false;
        renderizarCaixa();
        alert("Memória limpa! Agora se você for na loja e clicar Jogar p/ Comparador ele começará do zero.");
      }
    }

    function renderizarCaixa() {
      const divCaixa = document.getElementById("caixa-comparador");
      const conteudos = Object.values(dadosExtensaoBrutos);

      // Remove a metadata_title da array de conteudos
      let dataToProcess = { ...dadosExtensaoBrutos };
      delete dataToProcess.metadata_title;

      let temProduto = false;
      Object.values(dataToProcess).forEach(list => { if (Array.isArray(list) && list.length > 0) temProduto = true; });

      if (!temProduto) {
        divCaixa.innerHTML = '<span style="color: #666;">Nenhum produto enviado pela extensão ainda...</span>';
        clipboardTextClean = "";
        return;
      }

      let htmlOut = "";
      let plainTextOut = "";

      if (isSorted) {
        // == MODO: LISTA ÚNICA ORGANIZADA ==
        let unifiedAndSortedList = [];
        for (const [storeName, products] of Object.entries(dataToProcess)) {
          if (Array.isArray(products)) {
            products.forEach(p => {
              unifiedAndSortedList.push({
                store: storeName,
                title: p.title,
                spot: p.spot,
                install: p.install,
                _parsedPrice: parseSpotPrice(p.spot)
              });
            });
          }
        }

        unifiedAndSortedList.sort((a, b) => a._parsedPrice - b._parsedPrice);

        const titleStr = generateSmartTitle(unifiedAndSortedList);
        const titleText = titleStr.split('\n').map(l => `*${l}*`).join('\n');

        htmlOut += `<strong>${titleText}</strong>\n\n=====================\n\n`;
        plainTextOut += `${titleText}\n\n=====================\n\n`;

        const listItemsHtml = unifiedAndSortedList.map(p => {
          let badgeClass = "dufrio";
          if (p.store.toLowerCase().includes('leveros')) badgeClass = "leveros";
          if (p.store.toLowerCase().includes('central ar')) badgeClass = "centralar";

          let emojiCycle = "❄️";
          const tl = p.title.toLowerCase();
          if (tl.includes('quente/frio') || tl.includes('quente e frio') || tl.includes('q/f')) emojiCycle = "🔥❄️";

          // HTML version (com a badge discreta injetada na linha da parcela)
          const htmlItem = `${emojiCycle} ${p.title}\n💰 <span style="color: var(--green); font-weight: bold;">${p.spot}</span>\n💳 <span style="color: #bbb;">${p.install}</span><span class="badge-inline ${badgeClass}">${p.store}</span>`;
          return htmlItem;
        });

        htmlOut += listItemsHtml.join('\n\n<span style="color:#555">_____</span>\n\n');

        // Texto plano limpíssimo sem as Lojas
        const listItemsPlain = unifiedAndSortedList.map(p => formatProductText(p.title, p.spot, p.install));
        plainTextOut += listItemsPlain.join('\n\n_____\n\n');

      } else {
        // == MODO: LISTAS SEPARADAS POR LOJA (Como chegaram) ==
        let blocosHtml = [];
        let blocosPlain = [];

        for (const [storeName, products] of Object.entries(dataToProcess)) {
          if (!Array.isArray(products) || products.length === 0) continue;

          let badgeClass = "dufrio";
          if (storeName.toLowerCase().includes('leveros')) badgeClass = "leveros";
          if (storeName.toLowerCase().includes('central ar')) badgeClass = "centralar";

          const titleStr = generateSmartTitle(products);
          const titleText = titleStr.split('\n').map(l => `*${l}*`).join('\n');

          // HTML version
          const listItemsHtml = products.map(p => {
            let emojiCycle = "❄️";
            const tl = p.title.toLowerCase();
            if (tl.includes('quente/frio') || tl.includes('quente e frio') || tl.includes('q/f')) emojiCycle = "🔥❄️";
            return `${emojiCycle} ${p.title}\n💰 <span style="color: var(--green); font-weight: bold;">${p.spot}</span>\n💳 <span style="color: #bbb;">${p.install}</span><span class="badge-inline ${badgeClass}">${storeName}</span>`;
          });
          const blocoHtml = `📦 <strong>${storeName.toUpperCase()}</strong>\n${titleText}\n\n${listItemsHtml.join('\n\n<span style="color:#555">_____</span>\n\n')}`;
          blocosHtml.push(blocoHtml);

          // Plain string version (Sem loja)
          const listItemsPlain = products.map(p => formatProductText(p.title, p.spot, p.install));
          const blocoPlain = `${titleText}\n\n${listItemsPlain.join('\n\n_____\n\n')}`;
          blocosPlain.push(blocoPlain);
        }

        htmlOut = blocosHtml.join('\n\n\n=====================\n\n\n');
        plainTextOut = blocosPlain.join('\n\n\n=====================\n\n\n');
      }

      divCaixa.innerHTML = htmlOut;
      clipboardTextClean = plainTextOut;
    }

    function organizarTudo() {
      if (Object.keys(dadosExtensaoBrutos).length === 0) {
        alert("Jogue itens da extensão para o comparador primeiro!");
        return;
      }
      isSorted = true;
      renderizarCaixa();
    }

    function copiarCaixa(btnElement) {
      if (!clipboardTextClean || clipboardTextClean.trim() === "") {
        alert("A caixa está vazia!");
        return;
      }

      // COPIA O TEXTO LIMPO PRE-CALCULADO
      navigator.clipboard.writeText(clipboardTextClean).then(() => {
        const old = btnElement.innerText;
        btnElement.innerText = "Texto Copiado! ✔️";
        setTimeout(() => btnElement.innerText = old, 3000);
      });
    }

  </script>

</body>
