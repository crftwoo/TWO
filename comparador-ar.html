<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Busca Ar-Condicionado</title>
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⇄</text></svg>">

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;800;900&display=swap');

    * {
      box-sizing: border-box;
    }

    :root {
      --green: #9BE20D;
      --border: rgba(255, 255, 255, 0.05);
      --bg-color: #050505;
      --card-bg: #0A0A0A;
      --text-secondary: #71717a;
    }

    body {
      margin: 0;
      padding: 40px 20px;
      font-family: 'Montserrat', sans-serif;
      background: var(--bg-color);
      color: #fff;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding-bottom: 80px;
      animation: fadeIn 0.6s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    h1 {
      font-size: 32px;
      font-weight: 900;
      margin-bottom: 8px;
      letter-spacing: -1px;
      text-transform: uppercase;
      font-style: italic;
      color: var(--green);
    }

    .sub-head {
      font-size: 11px;
      color: var(--text-secondary);
      margin-bottom: 40px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 24px;
    }

    h2 {
      font-weight: 900;
      margin: 48px 0 24px;
      text-transform: uppercase;
      letter-spacing: -0.5px;
      font-size: 18px;
    }

    .section {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }

    button {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      cursor: pointer;
      padding: 16px 32px;
      color: #fff;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-size: 12px;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
      font-family: 'Montserrat', sans-serif;
    }

    button:hover {
      border-color: rgba(255, 255, 255, 0.2);
      transform: translateY(-2px);
    }

    button.selecionado {
      background: var(--green);
      color: #000;
      border-color: var(--green);
      transform: translateY(-2px);
      box-shadow: 0 8px 15px rgba(155, 226, 13, 0.3);
    }

    .tipo-btn {
      width: 180px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      padding: 24px 16px;
    }

    .tipo-btn.selecionado {
      background: var(--green);
      color: #000;
      border-color: var(--green);
    }

    .tipo-btn img {
      width: 140px;
      mix-blend-mode: lighten;
      filter: contrast(1.6) brightness(0.7) drop-shadow(0 0 4px rgba(75, 216, 255, 0.2));
      transition: transform 0.3s ease, filter 0.3s ease;
    }

    .tipo-btn:hover img {
      transform: scale(1.05);
      filter: contrast(1.8) brightness(0.9) drop-shadow(0 0 8px rgba(75, 216, 255, 0.4));
    }

    .tipo-btn.selecionado img {
      filter: contrast(1.8) brightness(1.1);
      mix-blend-mode: normal;
      /* remove the lighten on green bg for better view or keep it if png handles it */
    }

    #resultados {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 24px;
    }

    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      padding: 32px;
      border-radius: 20px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      transition: all 0.3s ease;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    }

    .card:hover {
      transform: translateY(-4px);
      border-color: rgba(255, 255, 255, 0.1);
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.8);
    }

    .card strong {
      font-weight: 800;
      font-size: 16px;
      margin-bottom: 24px;
      display: block;
      color: #fff;
      text-transform: uppercase;
      letter-spacing: -0.5px;
    }

    .card a {
      text-decoration: none;
      width: 100%;
    }

    .card button {
      width: 100%;
      background: rgba(255, 255, 255, 0.05);
      color: #fff;
      border: 1px solid var(--border);
    }

    .card button:hover {
      background: var(--green);
      color: #000;
      border-color: var(--green);
      transform: translateY(-2px);
      box-shadow: 0 8px 15px rgba(155, 226, 13, 0.25);
    }

    @media (max-width: 768px) {
      body {
        padding: 24px 16px;
      }

      h1 {
        font-size: 28px;
      }

      .sub-head {
        margin-bottom: 24px;
        padding-bottom: 16px;
      }

      .section {
        flex-direction: column;
        gap: 12px;
      }

      .tipo-btn,
      .section button {
        width: 100%;
      }

      .tipo-btn {
        padding: 16px;
        flex-direction: row;
        justify-content: space-between;
      }

      .tipo-btn img {
        width: 100px;
      }

      #resultados {
        grid-template-columns: 1fr;
      }

      .card {
        padding: 24px;
      }
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>Busca Ar-Condicionado</h1>
    <div class="sub-head">Buscador de preços de ar condicionado.</div>

    <h2>Selecione o Tipo</h2>
    <div id="tipos" class="section"></div>

    <h2>Selecione os BTUs</h2>
    <div id="btus" class="section"></div>

    <h2>Selecione o Ciclo</h2>
    <div id="ciclos" class="section"></div>

    <h2>Resultados</h2>
    <div id="resultados"></div>
  </div>

  <script>
    let dados = [], tipoSelecionado = null, btusSelecionado = null, cicloSelecionado = null;
    let ativoTipo = null, ativoBtu = null, ativoCiclo = null;

    const imagens = {
      "Hiwall": "img/hi_wall.png",
      "Hi Wall": "img/hi_wall.png",
      "Piso Teto": "img/piso_teto.png",
      "Cassete": "img/cassete.png"
    };

    fetch("https://opensheet.elk.sh/1LLVFTzxoSakgqnjS_ws7GgYNKdEqP26H0Z7Fe5DEmcc/Página1")
      .then(r => r.json()).then(j => { dados = j; gerarTipos(); });

    function scrollPara(id) {
      document.getElementById(id).scrollIntoView({ behavior: "smooth" });
    }

    function gerarTipos() {
      const tipos = [...new Set(dados.map(i => i.Tipo))];
      const div = document.getElementById("tipos");
      div.innerHTML = "";
      tipos.forEach(t => {
        const b = document.createElement("button");
        b.className = "tipo-btn";
        b.innerHTML = `<div class="img-wrapper"><img src="${imagens[t] || ''}"></div><span>${t}</span>`;
        b.onclick = () => {
          if (ativoTipo) ativoTipo.classList.remove("selecionado");
          b.classList.add("selecionado");
          ativoTipo = b;
          tipoSelecionado = t;
          document.getElementById("btus").innerHTML = "";
          document.getElementById("ciclos").innerHTML = "";
          document.getElementById("resultados").innerHTML = "";
          gerarBTUs();
          scrollPara("btus");
        };
        div.appendChild(b);
      });
    }

    function gerarBTUs() {
      const btus = [...new Set(dados.filter(i => i.Tipo === tipoSelecionado).map(i => i.BTUs))];
      const div = document.getElementById("btus");
      div.innerHTML = "";
      btus.forEach(b => {
        const bt = document.createElement("button");
        bt.textContent = b + " BTUs";
        bt.onclick = () => {
          if (ativoBtu) ativoBtu.classList.remove("selecionado");
          bt.classList.add("selecionado");
          ativoBtu = bt;
          btusSelecionado = b;
          document.getElementById("ciclos").innerHTML = "";
          document.getElementById("resultados").innerHTML = "";
          gerarCiclos();
          scrollPara("ciclos");
        };
        div.appendChild(bt);
      });
    }

    function gerarCiclos() {
      const ciclos = [...new Set(dados.filter(i => i.Tipo === tipoSelecionado && i.BTUs == btusSelecionado).map(i => i.Ciclo))];
      const div = document.getElementById("ciclos");
      div.innerHTML = "";
      ciclos.forEach(c => {
        const bt = document.createElement("button");
        bt.textContent = c;
        bt.onclick = () => {
          if (ativoCiclo) ativoCiclo.classList.remove("selecionado");
          bt.classList.add("selecionado");
          ativoCiclo = bt;
          cicloSelecionado = c;
          gerarResultados();
          scrollPara("resultados");
        };
        div.appendChild(bt);
      });
    }

    function gerarResultados() {
      const res = dados.filter(i => i.Tipo === tipoSelecionado && i.BTUs == btusSelecionado && i.Ciclo === cicloSelecionado);
      const div = document.getElementById("resultados");
      div.innerHTML = "";
      res.forEach(i => {
        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `<strong>${i.Site}</strong><br><br>
    <a href="${i.Link}" target="_blank"><button>Abrir pesquisa</button></a>`;
        div.appendChild(card);
      });
    }
  </script>

</body>

</html>
